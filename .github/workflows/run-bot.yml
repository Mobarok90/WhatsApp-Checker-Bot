name: 24/7 WhatsApp Checker Bot

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা পর পর ওয়ার্কফ্লো স্বয়ংক্রিয়ভাবে নতুন করে ট্রিগার হবে
  workflow_dispatch:      # গিটহাব থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 230  # গিটহাবের টাইমআউট লিমিট এড়াতে ৩.৮ ঘণ্টা পর স্বয়ংক্রিয় স্টপ হবে

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # হোয়াটসঅ্যাপ লগইন সেশন ক্যাশে সেভ করে রাখার জন্য (যাতে বারবার স্ক্যান করতে না হয়)
      - name: Cache WhatsApp Session
        uses: actions/cache@v3
        with:
          path: ./whatsapp_session
          key: whatsapp-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            whatsapp-session-${{ runner.os }}-

      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip xvfb
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI selenium

      - name: Run Selenium Bot
          # xvfb-run ভার্চুয়াল ফ্রেমবাফার দিয়ে হেডলেস মোডে স্ক্রিপ্ট সচল রাখবে
        run: |
          xvfb-run --auto-servernum timeout 220m python -u bot.py || true
