name: 24/7 WhatsApp Checker Bot

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা পর পর ওয়ার্কফ্লো রান হবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার জন্য

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 230

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # সেশন ক্যাশ সংরক্ষণ
      - name: Cache WhatsApp Session
        uses: actions/cache@v3
        with:
          path: ./whatsapp_session
          key: whatsapp-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            whatsapp-session-${{ runner.os }}-

      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip xvfb
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI selenium

      # ⚠️ এখানে মূল ফিক্স: পুরানো এবং অমিল থাকা ক্রোম ড্রাইভার সম্পূর্ণ ডিলিট করা
      - name: Remove Incompatible Pre-installed Chromedriver
        run: |
          sudo rm -f /usr/bin/chromedriver
          sudo rm -f /usr/local/bin/chromedriver

      - name: Run Selenium Bot
        run: |
          xvfb-run --auto-servernum timeout 220m python -u bot.py || true
