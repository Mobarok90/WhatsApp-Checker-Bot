name: 24/7 WhatsApp Checker Bot

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা পর পর ওয়ার্কফ্লো রান হবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার জন্য

# নতুন রান শুরু হলে আগের পুরোনো রানটি অটোম্যাটিক বন্ধ হয়ে যাবে
concurrency:
  group: whatsapp-checker-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 230

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # সেশন ক্যাশ সংরক্ষণ
      - name: Cache WhatsApp Session
        uses: actions/cache@v3
        with:
          path: ./whatsapp_session
          key: whatsapp-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            whatsapp-session-${{ runner.os }}-

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🔍 এখানে মূল স্মার্ট ফিক্স: অফিশিয়াল অ্যাকশন যা ক্রোমের সংস্করণের সাথে ১০০% মিলিয়ে ড্রাইভার সেটআপ করবে
      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v3

      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pyTelegramBotAPI selenium

      - name: Run Selenium Bot
        run: |
          # xvfb-run ব্যবহার করে ভার্চুয়াল ডিসপ্লেতে হেডলেস ক্রোম রান করা
          xvfb-run --auto-servernum timeout 220m python -u bot.py || true
